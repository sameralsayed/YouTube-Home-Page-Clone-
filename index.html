<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YouTube - Enjoy the videos and music you love, upload original content, and share it all with friends, family, and the world on YouTube.">
    <meta name="keywords" content="youtube, videos, music, gaming, live, shorts, mrbeast, trending, watch, upload">
    <meta name="author" content="SAMER SAEID">
    <title>YouTube</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://www.youtube.com/favicon.ico">
</head>
<body class="bg-dark text-light">
    <!-- TOP NAV -->
    <nav class="navbar navbar-expand-lg fixed-top bg-dark border-bottom border-secondary px-3">
        <div class="container-fluid">
            <!-- Left: Logo + Hamburger -->
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-light p-0 d-lg-none" onclick="toggleSidebar()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <a href="#" class="navbar-brand d-flex align-items-center gap-1">
                    <svg width="90" height="24" viewBox="0 0 90 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#FF0000" d="M27.8 3.2C27.8 1.4 26.4 0 24.6 0H3.2C1.4 0 0 1.4 0 3.2v17.6C0 22.6 1.4 24 3.2 24h21.4c1.8 0 3.2-1.4 3.2-3.2V3.2z"/>
                        <polygon fill="#FFF" points="35.5 7.5 35.5 16.5 44.5 12"/>
                    </svg>
                    <span class="fs-4 fw-bold" style="letter-spacing:-1px;">YouTube</span>
                </a>
            </div>

            <!-- Search -->
            <form class="d-flex flex-grow-1 mx-4" style="max-width:640px;">
                <div class="input-group">
                    <input type="text" class="form-control bg-black border-secondary text-light" placeholder="Search" aria-label="Search">
                    <button class="btn btn-secondary border-secondary">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    </button>
                </div>
                <button class="btn btn-secondary ms-2 rounded-circle">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </button>
            </form>

            <!-- Right icons -->
            <div class="d-flex align-items-center gap-2">
                <button onclick="showCreateModal()" class="btn btn-link text-light">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                </button>
                <button class="btn btn-link text-light position-relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.59 2 12.253v.004c0 4.08 2.72 7.53 6.5 8.75l.5.12v2.12c0 .55.45 1 1 1 .27 0 .53-.11.71-.29L15 18.1c1.06-.44 2-.98 2.78-1.64.78-.66 1.4-1.48 1.82-2.4C20.3 12.9 21 11.4 21 9.75 21 6.59 16.52 2 12 2z"/></svg>
                </button>
                <button class="btn btn-link text-light position-relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13v-2h-2v2h2zm-4 0v-2h-2v2h2zm-4 0v-2H9v2h2zm-4 0v-2H5v2h2z"/></svg>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">9+</span>
                </button>
                <div class="rounded-circle bg-secondary" style="width:32px;height:32px;background-image:url('https://picsum.photos/id/64/64');background-size:cover;"></div>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar bg-dark border-end border-secondary d-none d-lg-block" style="width:240px; position:fixed; top:56px; bottom:0; overflow-y:auto;">
            <ul class="list-unstyled mt-3">
                <li class="active"><a href="#" class="d-flex align-items-center gap-3 px-4 py-3 text-light"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg> Home</a></li>
                <li><a href="#" class="d-flex align-items-center gap-3 px-4 py-3 text-light"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M10 14.5L15 12L10 9.5V14.5Z"/></svg> Shorts</a></li>
                <li><a href="#" class="d-flex align-items-center gap-3 px-4 py-3 text-light"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17 18V5H7v13h10z"/></svg> Subscriptions</a></li>
                <li class="border-top border-secondary my-2"></li>
                <li><a href="#" class="d-flex align-items-center gap-3 px-4 py-3 text-light"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> You</a></li>
                <li><a href="#" class="d-flex align-items-center gap-3 px-4 py-3 text-light"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 5v14H5V5h14zm0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg> History</a></li>
                <!-- More items omitted for brevity but full in real file -->
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-grow-1 pt-5 mt-5" style="margin-left:240px;">
            <!-- CHIPS -->
            <div class="chips-scroll d-flex gap-2 overflow-x-auto px-4 py-3 bg-dark sticky-top" style="top:56px;z-index:10;">
                <!-- JS populated -->
            </div>

            <!-- VIDEO GRID -->
            <div class="container-fluid px-4">
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="videoGrid"></div>
            </div>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark border-top border-secondary mt-auto py-4">
        <div class="container-fluid px-4">
            <div class="row">
                <div class="col-md-3"><h6>Company</h6><ul class="list-unstyled small text-muted"><li>About</li><li>Press</li><li>Copyright</li></ul></div>
                <div class="col-md-3"><h6>Work with us</h6><ul class="list-unstyled small text-muted"><li>Advertise</li><li>Developers</li></ul></div>
                <div class="col-md-3"><h6>Terms &amp; Privacy</h6><ul class="list-unstyled small text-muted"><li>Terms</li><li>Privacy</li><li>Policy &amp; Safety</li></ul></div>
                <div class="col-md-3 text-end small text-muted">
                    <p>© 2026 YouTube (Replica)</p>
                    <p>Copyright SAMER SAEID</p>
                    <p>Made by ♥️ <a href="https://bio.link/samer" target="_blank" class="text-light text-decoration-none">SAMER SAEID</a></p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
